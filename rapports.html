<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Rapports</title>
<link rel="stylesheet" href="style.css">
<style>
/* Carousel horizontal */
.container {
  display: flex;
  overflow-x: auto;
  gap: 20px;
  padding: 20px;
  scroll-behavior: smooth;
}
.report {
  min-width: 300px;
  background: rgba(0,0,0,0.8);
  border: 2px solid #00ff00;
  border-radius: 10px;
  padding: 10px;
  text-align: center;
  flex-shrink: 0;
}
.report iframe {
  width: 100%;
  height: 200px;
  border: none;
}
.report a {
  color: #00ff00;
  text-decoration: none;
  font-weight: bold;
}
.report a:hover { text-decoration: underline; }
h1 { text-align: center; margin-top: 20px; text-shadow:0 0 10px #00ff00; }
</style>
</head>
<body>

<h1>📄 Rapports</h1>
<div class="container" id="report-container"></div>

<div style="text-align:center; margin-top:20px;">
  <button onclick="window.location.href='index.html'">Retour au portail</button>
</div>

<script>
// Charger les rapports depuis le JSON
fetch('rapports.json')
  .then(response => response.json())
  .then(data => {
    const container = document.getElementById('report-container');
    // Plus récent en premier
    data.reverse().forEach(report => {
      const div = document.createElement('div');
      div.className = 'report';
      // Aperçu Google Docs
      const iframe = document.createElement('iframe');
      iframe.src = report.url.replace('/edit', '/preview');
      div.appendChild(iframe);
      // Titre avec date
      const a = document.createElement('a');
      a.href = report.url;
      a.target = "_blank";
      a.textContent = `Rapport du ${report.date}`;
      div.appendChild(a);
      container.appendChild(div);
    });
  });
</script>

</body>
</html>
