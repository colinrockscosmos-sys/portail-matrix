<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Rapports</title>
<link rel="stylesheet" href="style.css">
<style>
.container {
  display: flex;
  overflow-x: auto;
  gap: 20px;
  padding: 20px;
}
.report {
  min-width: 300px;
  background: rgba(0,0,0,0.8);
  border: 2px solid #00ff00;
  border-radius: 10px;
  padding: 10px;
  text-align: center;
  flex-shrink: 0;
}
.report iframe {
  width: 100%;
  height: 200px;
  border: none;
}
.report a {
  color: #00ff00;
  text-decoration: none;
  font-weight: bold;
}
.report a:hover {
  text-decoration: underline;
}
h1 {
  text-align: center;
  margin-top: 20px;
  text-shadow: 0 0 10px #00ff00;
}
</style>
</head>
<body>

<h1>📄 Rapports</h1>
<div class="container" id="report-container"></div>

<div style="text-align:center; margin-top:20px;">
  <button onclick="window.location.href='index.html'">Retour au portail</button>
</div>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/1Uf0LABTQGnWeBs-VNKvnt6WTZCzjl9eg7qzHxGLKUIw/gviz/tq?tqx=out:json";

fetch(sheetURL)
  .then(response => response.text())
  .then(text => {
    // Google renvoie du JSON encapsulé, on enlève le début et la fin
    const json = JSON.parse(text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1));
    const rows = json.table.rows;

    // Transforme les lignes en objets
    const data = rows.map(r => {
      return {
        date: r.c[0] ? r.c[0].v : "",
        url: r.c[1] ? r.c[1].v : ""
      };
    });

    // Trier par date (le plus récent en premier)
    data.sort((a, b) => {
      const da = new Date(a.date.split('/').reverse().join('-'));
      const db = new Date(b.date.split('/').reverse().join('-'));
      return db - da;
    });

    const container = document.getElementById("report-container");

    data.forEach(report => {
      if (report.url) {
        const div = document.createElement("div");
        div.className = "report";

        const iframe = document.createElement("iframe");
        iframe.src = report.url.replace("/edit", "/preview");
        div.appendChild(iframe);

        const link = document.createElement("a");
        link.href = report.url;
        link.target = "_blank";
        link.textContent = `Rapport du ${report.date}`;
        div.appendChild(link);

        container.appendChild(div);
      }
    });
  })
  .catch(err => {
    console.error("Erreur:", err);
  });
</script>

</body>
</html>
